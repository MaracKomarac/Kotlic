<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proslava u Vinogradima • Kotlić 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            color: white;
            text-align: center;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), 
                        url(zlatni-kotlić-2018-semberija.jpg) center/cover no-repeat fixed;
            display: flex;
            align-items: flex-start;     /* pomak prema gore */
            justify-content: center;
            position: relative;
            padding-top: 100px;          /* glavni pomak - možeš mijenjati */
        }

        .container {
            max-width: 900px;
            padding: 20px;
        }

        header {
            position: absolute;
            top: 20px;
            right: 30px;
            text-align: right;
            font-size: 1.15rem;
            z-index: 10;
        }

        header a {
            color: #ffd700;
            text-decoration: none;
        }

        header a:hover {
            text-decoration: underline;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            margin-bottom: 8px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .subtitle {
            font-size: 1.45rem;
            margin-bottom: 50px;
            opacity: 0.95;
        }

        #countdown {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin: 40px 0 50px 0;
        }

        .time-box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px 28px;
            border-radius: 15px;
            min-width: 135px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .number {
            font-size: 3.6rem;
            font-weight: bold;
            line-height: 1;
        }

        .label {
            font-size: 1.05rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.85;
            margin-top: 8px;
        }

        .info {
            font-size: 1.35rem;
            line-height: 1.6;
            max-width: 720px;
            margin: 0 auto;
        }

        footer {
            position: absolute;
            bottom: 25px;
            font-size: 0.95rem;
            opacity: 0.75;
        }
    </style>
</head>
<body>

    <!-- LOKACIJA -->
    <header>
        <strong>Lokacija</strong><br>
        Vujcova klet<br>
        <small> 
            <a href="https://www.google.com/maps/dir//45.9746373,16.2463078/@45.9745587,16.2462652,68m/data=!3m1!1e3!4m2!4m1!3e0?entry=ttu&g_ep=EgoyMDI2MDYwMS4wIKXMDSoASAFQAw%3D%3D" 
               target="_blank">
                Google Maps
            </a>
        </small>
    </header>

    <div class="container">
        <h1>Kotlić u Vrtačama</h1>
        <p class="subtitle">Nezaboravno gastro iskustvo!</p>

        <div id="countdown">
            <div class="time-box">
                <div class="number" id="days">00</div>
                <div class="label">Dana</div>
            </div>
            <div class="time-box">
                <div class="number" id="hours">00</div>
                <div class="label">Sati</div>
            </div>
            <div class="time-box">
                <div class="number" id="minutes">00</div>
                <div class="label">Minuta</div>
            </div>
            <div class="time-box">
                <div class="number" id="seconds">00</div>
                <div class="label">Sekundi</div>
            </div>
        </div>

        <div class="info">
            <p>Dragi ljudi, dojdite u Vujcovu klet na domaći<br>
            kotlić od divljači i kapljicu našega zlatnoga vina!<br>
            Nemojte pozabiti donesti sastojke koje ste obećali. Čekam vas!<br>
        </p>


        </div>
    </div>

    <footer>
       Marac • 2026
    </footer>

    <script>
        // === PROMIJENI DATUM OVDJE ===
        const eventDate = new Date("2026-08-05T09:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = eventDate - now;

            if (distance < 0) {
                document.getElementById("countdown").innerHTML = "<h2 style='font-size:2.5rem;'>Proslava je počela! 🎉</h2>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").textContent = String(days).padStart(2, '0');
            document.getElementById("hours").textContent = String(hours).padStart(2, '0');
            document.getElementById("minutes").textContent = String(minutes).padStart(2, '0');
            document.getElementById("seconds").textContent = String(seconds).padStart(2, '0');
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
